name: CI
# Runs the test suite on every PR and on pushes to main. This is the status
# check the regeneration auto-merge waits on: configure branch protection on
# `main` to require the "Test" check before merging.
# yamllint disable-line rule:truthy
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.repository_owner == 'SukramJ'
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install package + dev tooling
        run: pip install -e '.[dev]'

      - name: Run tests
        run: make test

  # Guards that the committed generated modules still match what `make generate`
  # produces from the daemon's contract assets — catches hand-edits to enums.py /
  # rest.py / ws.py / the stamped const.py block that would drift from the daemon.
  #
  # The daemon ref is taken from the regen branch name (regen/daemon-<tag>); the
  # check is a no-op success on every other branch. It MUST stay a single job
  # that always runs so it can be a required status check without leaving normal
  # PRs stuck waiting on a skipped job — hence the per-step `if`, not a job-level
  # one.
  regen-clean:
    if: github.repository_owner == 'SukramJ'
    name: Regen clean
    runs-on: ubuntu-latest
    env:
      HEAD_REF: ${{ github.head_ref }}
    steps:
      - name: Detect regeneration PR
        id: detect
        run: |
          set -euo pipefail
          if [[ "${HEAD_REF}" == regen/daemon-* ]]; then
            TAG="${HEAD_REF#regen/daemon-}"
            echo "is_regen=true" >> "$GITHUB_OUTPUT"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "Regeneration PR for daemon ${TAG} — will verify it is reproducible"
          else
            echo "is_regen=false" >> "$GITHUB_OUTPUT"
            echo "Not a regen/daemon-* branch — nothing to verify"
          fi

      - name: Checkout types repo
        if: steps.detect.outputs.is_regen == 'true'
        uses: actions/checkout@v7.0.0

      - name: Checkout daemon at the branch's tag
        if: steps.detect.outputs.is_regen == 'true'
        uses: actions/checkout@v7.0.0
        with:
          repository: SukramJ/openccu-loom
          ref: ${{ steps.detect.outputs.tag }}
          path: openccu-loom

      - name: Set up Python
        if: steps.detect.outputs.is_regen == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install package + dev tooling
        if: steps.detect.outputs.is_regen == 'true'
        run: pip install -e '.[dev]'

      - name: Regenerate and assert no drift
        if: steps.detect.outputs.is_regen == 'true'
        run: |
          set -euo pipefail
          make generate OPENCCU_LOOM_REPO=openccu-loom
          # datamodel-codegen stamps a fresh `# timestamp:` header into rest.py on
          # every run, so ignore that line — a timestamp-only change is not drift.
          IGNORE='^#   timestamp:'
          if ! git diff --quiet -I"${IGNORE}" -- openccu_loom_types/; then
            echo "::error::make generate from daemon ${{ steps.detect.outputs.tag }} produced a diff — the committed modules are not reproducible. Re-run 'make generate' and commit, and do not hand-edit generated files."
            git --no-pager diff --stat -I"${IGNORE}" -- openccu_loom_types/
            git --no-pager diff -I"${IGNORE}" -- openccu_loom_types/
            exit 1
          fi
          echo "Generated modules are reproducible from daemon ${{ steps.detect.outputs.tag }}"
