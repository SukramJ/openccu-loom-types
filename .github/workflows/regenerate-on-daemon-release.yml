name: "Regenerate: on daemon release"
# Fired by the openccu-loom release workflow via repository_dispatch
# (event_type: daemon-release, client_payload.tag: the released tag).
# Checks out the daemon at that tag, regenerates every generated
# module from its committed contract assets (fresh at any release tag
# — the daemon's CI guards enforce that), stamps the schema digest +
# api_version, bumps the package patch version, and opens a PR.
# Manual fallback: workflow_dispatch with the tag as input.
# yamllint disable-line rule:truthy
on:
  repository_dispatch:
    types: [daemon-release]
  workflow_dispatch:
    inputs:
      tag:
        description: "openccu-loom release tag (e.g. v0.2.0)"
        required: true
      breaking:
        description: "Contract change is breaking (bumps minor instead of patch)"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  regenerate:
    if: github.repository_owner == 'SukramJ'
    name: Regenerate types from daemon tag
    runs-on: ubuntu-latest
    steps:
      - name: Resolve daemon tag
        run: |
          TAG="${{ github.event.client_payload.tag || github.event.inputs.tag }}"
          if [ -z "$TAG" ]; then
            echo "No daemon tag in payload/input" >&2
            exit 1
          fi
          echo "DAEMON_TAG=${TAG}" >> "$GITHUB_ENV"

      # Checked out with the PAT so the regen branch is pushed under a real
      # identity — a branch/PR created via GITHUB_TOKEN would NOT trigger the
      # CI workflow, so the auto-merge would have no status check to wait on.
      - name: Checkout types repo
        uses: actions/checkout@v6.0.3
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - name: Checkout daemon at the released tag
        uses: actions/checkout@v6.0.3
        with:
          repository: SukramJ/openccu-loom
          ref: ${{ env.DAEMON_TAG }}
          path: openccu-loom

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install generation tooling
        run: pip install -e '.[dev]'

      - name: Regenerate modules + stamp contract identity
        run: make generate OPENCCU_LOOM_REPO=openccu-loom

      - name: Open regeneration PR and enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          BREAKING: ${{ github.event.client_payload.breaking || github.event.inputs.breaking || 'false' }}
        run: |
          set -euo pipefail
          # Guard BEFORE the version bump: `make generate` has stamped the schema
          # digest + daemon api_version and regenerated the modules, so if nothing
          # under openccu_loom_types/ changed, the daemon contract is identical to
          # the last release — do nothing. An API-unchanged daemon release thus
          # cuts no new types release (no bump, no PR, no tag, no PyPI publish).
          if git diff --quiet -- openccu_loom_types/; then
            echo "No generated-module changes for ${DAEMON_TAG} — nothing to do"
            exit 0
          fi

          # Contract changed → bump the package version. Patch for compatible
          # regenerations; minor bump (patch reset) when the daemon flags the
          # change as breaking — the breaking-ness then shows in the types version
          # itself, and exact-pinning consumers (openccu-loom-client) see it in
          # the diff. The bump runs only here, after the guard, so VERSION never
          # churns const.py for an unchanged contract (which would otherwise
          # defeat the guard above and force a release every daemon release).
          python3 - <<'EOF'
          import os
          import re
          from pathlib import Path

          breaking = os.environ.get("BREAKING", "false").lower() == "true"
          path = Path("openccu_loom_types/const.py")
          text = path.read_text(encoding="utf-8")
          match = re.search(r'^VERSION: Final = "(\d+)\.(\d+)\.(\d+)"$', text, re.MULTILINE)
          if not match:
              raise SystemExit("VERSION constant not found")
          major, minor, patch = map(int, match.groups())
          if breaking:
              minor, patch = minor + 1, 0
          else:
              patch += 1
          new = f'VERSION: Final = "{major}.{minor}.{patch}"'
          path.write_text(text[: match.start()] + new + text[match.end() :], encoding="utf-8")
          print(f"{new} (breaking={breaking})")
          EOF

          VERSION="$(sed -nE 's/^VERSION: Final = "([^"]+)"$/\1/p' openccu_loom_types/const.py)"
          API_VERSION="$(sed -nE 's/^DAEMON_API_VERSION: Final = "([^"]+)"$/\1/p' openccu_loom_types/const.py)"

          # Seed a changelog section for the bumped version. release-on-tag
          # extracts its release notes from changelog.md and ABORTS when the
          # tagged version has no "# Version <version> (…)" section, so an
          # entry must exist before the tag is pushed. This is an auto-generated
          # baseline — enrich it in this PR before merging and tagging.
          DATE="$(date -u +%Y-%m-%d)"
          if ! grep -qF "# Version ${VERSION} (" changelog.md; then
            KIND="Feat"
            BREAKING_NOTE=""
            if [ "$BREAKING" = "true" ]; then
              KIND="Feat (BREAKING)"
              BREAKING_NOTE=" The daemon flagged this contract change as BREAKING — review the module diff for removed/renamed fields before merging."
            fi
            {
              printf '# Version %s (%s)\n\n' "${VERSION}" "${DATE}"
              printf -- '- %s: regenerate from openccu-loom %s for daemon api %s. `DAEMON_API_VERSION` → %s and `SCHEMA_DIGEST` refreshed; see the generated module diff for added/changed types.%s\n\n' \
                "${KIND}" "${DAEMON_TAG}" "${API_VERSION}" "${API_VERSION}" "${BREAKING_NOTE}"
              cat changelog.md
            } > changelog.md.new
            mv changelog.md.new changelog.md
            echo "Prepended changelog section for ${VERSION}"
          else
            echo "changelog.md already has a section for ${VERSION} — leaving it untouched"
          fi

          BRANCH="regen/daemon-${DAEMON_TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add openccu_loom_types/ changelog.md
          git commit -s -m "feat: regenerate from openccu-loom ${DAEMON_TAG} (${VERSION})"
          git push origin "$BRANCH"
          TITLE_SUFFIX=""
          BREAKING_NOTE=""
          if [ "$BREAKING" = "true" ]; then
            TITLE_SUFFIX=" (BREAKING)"
            BREAKING_NOTE="
          **The daemon flagged this contract change as BREAKING** — the minor version was bumped; review the module diff for removed/renamed fields before merging.
          "
          fi
          PR_URL="$(gh pr create \
            --title "Regenerate types from openccu-loom ${DAEMON_TAG}${TITLE_SUFFIX}" \
            --body "Automated regeneration from the daemon release \`${DAEMON_TAG}\`.
          ${BREAKING_NOTE}
          - generated modules: \`enums.py\`, \`rest.py\`, \`ws.py\`
          - \`const.py\`: schema digest + daemon api_version stamped, package version bumped to \`${VERSION}\`
          - \`changelog.md\`: seeded a baseline \`# Version ${VERSION}\` section (release-on-tag needs it)

          **Auto-merge is enabled**: once the CI check is green this PR squash-merges,
          which triggers tag-on-regen-merge → \`v${VERSION}\` → release + PyPI publish.
          To enrich the changelog or hold a breaking change, cancel auto-merge with
          \`gh pr merge --disable-auto ${BRANCH}\` before CI finishes.")"

          # Auto-merge once required status checks pass. Squash to keep main's
          # one-commit-per-regeneration history; release-on-tag then reads the
          # bumped VERSION / seeded changelog section from the merged main.
          # --delete-branch removes the regen/ branch once the merge lands, so
          # it doesn't linger after the release.
          gh pr merge --auto --squash --delete-branch "$PR_URL"
          echo "Enabled auto-merge for $PR_URL"
