name: "Release: Tag on regen merge"
# When an automated regeneration PR (branch regen/daemon-*) is merged into
# main, read the bumped VERSION from const.py and push the matching v<version>
# tag. That tag push triggers release-on-tag.yml, which creates the GitHub
# Release and dispatches the PyPI publish — closing the loop end to end.
#
# The tag MUST be pushed with a PAT (secrets.RELEASE_PAT), not GITHUB_TOKEN:
# a tag pushed by GITHUB_TOKEN does not trigger release-on-tag.yml (GitHub's
# recursive-workflow guard).
# yamllint disable-line rule:truthy
on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  tag:
    if: >
      github.repository_owner == 'SukramJ'
      && github.event.pull_request.merged == true
      && startsWith(github.event.pull_request.head.ref, 'regen/daemon-')
    name: Tag merged regeneration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout merged main
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Read version and push tag
        run: |
          set -euo pipefail
          VERSION="$(sed -nE 's/^VERSION: Final = "([^"]+)"$/\1/p' openccu_loom_types/const.py)"
          if [ -z "$VERSION" ]; then
            echo "VERSION constant not found in const.py" >&2
            exit 1
          fi
          TAG="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — nothing to do"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo "Pushed ${TAG}"
